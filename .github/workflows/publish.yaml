name: Publish to npm

# Triggers on tag push (e.g. v0.1.0-alpha.1) or manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all @holdpoint/* packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC Trusted Publisher

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          # No registry-url — omitting it prevents setup-node from injecting
          # GITHUB_TOKEN as NODE_AUTH_TOKEN, which would block the OIDC exchange.
          # Node 24 ships with npm 11.x which supports OIDC Trusted Publisher natively.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/*"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match @holdpoint/cli version $PKG_VERSION"
            echo "Either bump the package versions to $TAG, or retag the right commit."
            exit 1
          fi
          echo "Tag and package version match: $PKG_VERSION ✓"
          echo "npm version: $(npm --version)"

      - name: Publish packages in dependency order
        run: |
          set -e
          for pkg in types yaml-core engine-copilot engine-claude engine-cursor engine-codex cli; do
            echo "── Publishing @holdpoint/$pkg ──"
            (cd packages/$pkg && npm publish --tag alpha)
          done
          echo "── Publishing holdpoint (meta-package) ──"
          (cd packages/holdpoint && npm publish --tag alpha)

      - name: Summary
        run: |
          echo "### Published @holdpoint/* @ ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "All 8 packages published with OIDC provenance." >> "$GITHUB_STEP_SUMMARY"
          echo "View on npm: https://www.npmjs.com/org/holdpoint" >> "$GITHUB_STEP_SUMMARY"

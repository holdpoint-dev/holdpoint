name: Publish to npm

# Triggers on tag push (e.g. v0.1.0-alpha.1).
# You decide when this runs — push a tag, it publishes. No bot PRs to merge.
on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all @holdpoint/* packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publisher (OIDC) + provenance attestation
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/*"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match @holdpoint/cli version $PKG_VERSION"
            echo "Either bump the package versions to $TAG, or retag the right commit."
            exit 1
          fi
          echo "Tag and package version match: $PKG_VERSION"

      - name: Publish packages in dependency order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -e
          for pkg in types yaml-core engine-copilot engine-claude engine-cursor engine-codex cli; do
            echo "── Publishing @holdpoint/$pkg ──"
            (cd packages/$pkg && npm publish --tag alpha)
          done
          echo "── Publishing holdpoint (meta-package) ──"
          (cd packages/holdpoint && npm publish --tag alpha)

      - name: Summary
        run: |
          echo "### Published @holdpoint/* @ ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All 7 packages published with provenance attestation." >> "$GITHUB_STEP_SUMMARY"
          echo "View on npm: https://www.npmjs.com/org/holdpoint" >> "$GITHUB_STEP_SUMMARY"

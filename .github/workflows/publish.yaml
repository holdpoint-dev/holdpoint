name: Publish to npm

# Triggers on tag push (e.g. v0.1.0-alpha.1) or manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all @holdpoint/* packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC Trusted Publisher

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          # No registry-url — omitting it prevents setup-node from injecting
          # GITHUB_TOKEN as NODE_AUTH_TOKEN, which would block the OIDC exchange.
          # Node 24 ships with npm 11.x which supports OIDC Trusted Publisher natively.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/*"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match @holdpoint/cli version $PKG_VERSION"
            echo "Either bump the package versions to $TAG, or retag the right commit."
            exit 1
          fi
          echo "Tag and package version match: $PKG_VERSION ✓"
          echo "npm version: $(npm --version)"

      - name: Publish packages in dependency order
        run: |
          set -e
          # Convention while we're pre-1.0: BOTH `latest` and `alpha` point at
          # the newest alpha version. `pnpm publish --tag alpha` only sets the
          # alpha tag, leaving `latest` frozen on an older publish, so we
          # explicitly `dist-tag add latest` after each successful publish.
          # When we cut a beta or stable, change `latest` here to stop tracking
          # alpha and freeze alpha on the last alpha publish.
          publish_pkg() {
            local dir="$1" name="$2" version="$3"
            if npm view "${name}@${version}" version &>/dev/null 2>&1; then
              echo "── ${name}@${version} already published — re-syncing dist-tags ──"
            else
              echo "── Publishing ${name}@${version} ──"
              # Use pnpm publish so workspace:* references are replaced with the
              # real resolved version before the tarball is created. --provenance
              # explicitly requests OIDC attestation (npm 11 picks this up via env).
              (cd "$dir" && pnpm publish --tag alpha --no-git-checks --provenance)
            fi
            # Idempotent sync — running these when the tags already match is a no-op.
            npm dist-tag add "${name}@${version}" alpha
            npm dist-tag add "${name}@${version}" latest
          }
          for pkg in types yaml-core engine-copilot engine-claude engine-cursor engine-codex live-protocol sdk live-daemon cli; do
            dir="packages/$pkg"
            name=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")
            publish_pkg "$dir" "$name" "$version"
          done
          publish_pkg "packages/holdpoint" "holdpoint" "$(node -p "require('./packages/holdpoint/package.json').version")"

      - name: Summary
        run: |
          echo "### Published @holdpoint/* @ ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "All 11 packages published with OIDC provenance." >> "$GITHUB_STEP_SUMMARY"
          echo "View on npm: https://www.npmjs.com/org/holdpoint" >> "$GITHUB_STEP_SUMMARY"

name: Publish to npm

# Triggers on tag push (e.g. v0.1.0-alpha.1) or explicit dispatch from
# version.yaml after it creates a release tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0-alpha.17"
        required: false
        type: string

concurrency:
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish all @holdpoint/* packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC Trusted Publisher

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          # No registry-url — omitting it prevents setup-node from injecting
          # GITHUB_TOKEN as NODE_AUTH_TOKEN, which would block the OIDC exchange.
          # Node 24 ships with npm 11.x which supports OIDC Trusted Publisher natively.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/*"

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          TAG="${RELEASE_TAG#v}"
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $RELEASE_TAG does not match @holdpoint/cli version $PKG_VERSION"
            echo "Either bump the package versions to $TAG, or retag the right commit."
            exit 1
          fi
          echo "Tag and package version match: $PKG_VERSION ✓"
          echo "npm version: $(npm --version)"

      - name: Publish packages in dependency order
        run: |
          set -e
          # OIDC trusted publishing authenticates the package publish itself.
          # It does not authorize separate `npm dist-tag add` mutations, so the
          # publish tag is the only dist-tag this workflow can set.
          PUBLISH_TAG=latest
          publish_pkg() {
            local dir="$1" name="$2" version="$3"
            if npm view "${name}@${version}" version &>/dev/null 2>&1; then
              echo "── ${name}@${version} already published — leaving existing dist-tags unchanged ──"
            else
              echo "── Publishing ${name}@${version} with dist-tag ${PUBLISH_TAG} ──"
              # Use pnpm publish so workspace:* references are replaced with the
              # real resolved version before the tarball is created. --provenance
              # explicitly requests OIDC attestation (npm 11 picks this up via env).
              (cd "$dir" && pnpm publish --tag "$PUBLISH_TAG" --no-git-checks --provenance)
            fi
          }
          for pkg in types yaml-core engine-copilot engine-claude engine-cursor engine-codex live-protocol sdk live-daemon cli; do
            dir="packages/$pkg"
            name=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")
            publish_pkg "$dir" "$name" "$version"
          done
          publish_pkg "packages/holdpoint" "holdpoint" "$(node -p "require('./packages/holdpoint/package.json').version")"

      - name: Summary
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          echo "### Published @holdpoint/* @ ${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "All packages published with OIDC provenance." >> "$GITHUB_STEP_SUMMARY"
          echo "View on npm: https://www.npmjs.com/org/holdpoint" >> "$GITHUB_STEP_SUMMARY"

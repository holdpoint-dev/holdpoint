## ─── Holdpoint checks configuration ──────────────────────────────────────────
##
## This file is the SINGLE SOURCE OF TRUTH for all holdpoint checks.
##
## HOW IT WORKS
##   1. Edit this file to add, change, or remove checks.
##   2. Run `npx holdpoint update` to regenerate the runtime files:
##        .github/hooks/holdpoint.json          ← Copilot CLI hook registration
##        .github/hooks/holdpoint-check.mjs     ← sessionStart context injection script
##        .github/holdpoint/generated/checks.immutable.json ← parsed config read at runtime
##   3. The `holdpoint-sync` check below enforces step 2 automatically — if this
##      file is staged, `holdpoint update` runs before any task can be marked done.
##
## DO NOT EDIT generated files directly — changes will be overwritten.
##   holdpoint.json         is a static hook registration; it never needs manual changes.
##   holdpoint-check.mjs    is a static runtime wrapper; it never needs manual changes.
##   checks.immutable.json is auto-generated from this file; treat it as read-only.
##
## ─────────────────────────────────────────────────────────────────────────────

version: 1
context:
  guides:
    dev-note: >
      This repo is simultaneously the Holdpoint codebase and its own guinea pig. Every check below runs against Holdpoint
      itself. When an AI agent adds a new persistent check (new linter, new validator, new invariant), add it here so
      all future agents inherit it automatically.

## This repo IS the holdpoint codebase, so engine hooks use the local CLI
## (holdpoint is installed as a workspace devDep at the root).
## Consumer projects omit this block and get the npx fallback.
engines:
  claude:
    stop_command: "node_modules/.bin/holdpoint check --staged"
  codex:
    stop_command: "node_modules/.bin/holdpoint check --staged"
  copilot:
    check_command: "node_modules/.bin/holdpoint check --staged"

conditions:
  - id: packages-built
    operator: file_exists
    path: packages/yaml-core/dist/index.js
  - id: has-changesets
    operator: file_exists
    path: .changeset/config.json
patterns:
  checks-file: "^checks\\.yaml$"
  builder-src: "^apps/builder/src/"
  templates-src: "^templates/"
  lib-src: "^(packages/.*/src/|templates/)"
  web-src: "^apps/web/src/"
  changelog-files: "(^|/)CHANGELOG\\.md$"
checks:
  - id: typecheck
    label: TypeScript — all packages
    cmd: pnpm turbo typecheck
  - id: lint
    label: ESLint — all packages
    cmd: pnpm turbo lint
  - id: test
    label: Vitest — all packages
    cmd: pnpm turbo test
  - id: template-validate
    label: All YAML templates parse against Zod schema
    cmd: >-
      node --input-type=module -e "import {parseHoldpointYaml} from './packages/yaml-core/dist/index.js';import
      {readFileSync,readdirSync} from 'node:fs';const
      f=readdirSync('templates').filter(f=>f.endsWith('.yaml'));for(const t of
      f){parseHoldpointYaml(readFileSync('templates/'+t,'utf8'));console.log('OK: '+t);}console.log('All '+f.length+'
      templates valid.');"
    conditionId: packages-built
  - id: format-check
    label: Prettier — format check
    cmd: pnpm format:check
  - id: holdpoint-sync
    label: Holdpoint engine files in sync with checks.yaml
    when: checks-file
    cmd: node packages/cli/dist/index.js update
  - id: builder-e2e
    label: Playwright — builder UI smoke tests
    when: builder-src
    cmd: pnpm --filter @holdpoint/builder test:e2e
  - id: changeset
    label: Changeset for package changes
    cmd: node packages/cli/dist/index.js require-changeset --staged --include packages/*
  - id: changelog-changeset
    label: Use changesets instead of manual changelog edits
    when: changelog-files
    conditionId: has-changesets
    prompt: >
      If you changed any CHANGELOG.md file, move the release note into a .changeset/*.md entry and let the release bot
      update changelogs. Keep manual changelog edits only when explicitly requested or for non-release historical notes,
      and state that reason before finishing.
  - id: rebuild-after-changes
    label: Rebuild dist/ after any source change
    when: backend
    prompt: >
      After changing any package source file in packages/*/src/, run: pnpm turbo build The CLI and engines run from
      dist/, not src/ — stale builds silently run old code.
  - id: types-schema-sync
    label: Update Zod schema when TypeScript types change
    when: backend
    prompt: >
      If you changed interfaces in packages/types/src/index.ts, update the Zod schema in
      packages/yaml-core/src/schema.ts to match, then rebuild: pnpm turbo build.
  - id: template-toolbar-sync
    label: Keep builder default template loader in sync
    when: templates-src
    prompt: >
      If you changed templates/default.yaml, confirm apps/builder/src/components/Toolbar.tsx still loads that file as
      the builder's default template.
  - id: cli-readme-sync
    label: Update README when CLI commands change
    when: backend
    prompt: >
      If you added, removed, or changed a command in packages/cli/src/commands/, update the Commands section in
      README.md with the new usage and description.
  - id: docs-sync
    label: Keep /docs page in sync with schema/CLI changes
    when: lib-src
    prompt: >
      If you changed the checks.yaml schema, CLI commands, supported agents, or when: scope patterns in
      packages/yaml-core/src/trigger.ts, update apps/web/src/app/docs/page.tsx to reflect those changes.
  - id: git-workflow
    label: Use the right git workflow
    prompt: >
      Choose the least-disruptive git workflow: use branch + PR for requested feature branches or protected-main work;
      for small local fixes, commit on the current branch without opening a PR unless asked; if already on a feature
      branch, keep committing there instead of creating another branch. Push only when a PR, remote review, CI run, or
      handoff needs it; otherwise leave the commit local and report the branch/commit.
  - id: git-commit
    label: Commit all changes before finishing
    cmd: >-
      git rev-parse --is-inside-work-tree >/dev/null 2>&1 || exit 0; [ -n "${GIT_INDEX_FILE:-}" ] && exit 0; [ -z
      "$(git status --porcelain)" ] && exit 0; git status --short; exit 1
  - id: no-todos
    label: No TODO/FIXME left in changed code
    cmd: >-
      ! grep -rEn "TODO|FIXME|HACK|XXX" packages/*/src apps/*/src
      --include="*.ts" --include="*.tsx"
  - id: live-spec-progress
    label: Keep HOLDPOINT_LIVE_SPEC.md progress tracker current
    prompt: >-
      On every commit, if this task touched any Holdpoint Live implementation, update HOLDPOINT_LIVE_SPEC.md before
      finishing. Keep the phase status table, granular todo checklists, and deferred-item notes accurate for what is
      now implemented vs still pending.
  - id: build
    label: Production build passes
    when: backend
    cmd: pnpm build
session_context_files:
  - MASTER_PROMPT.md
